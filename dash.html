<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReyzCloud Dashboard - Premium</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --sidebar: #1e293b; 
            --accent: #38bdf8; 
            --text: #f8fafc; 
            --danger: #ef4444; 
            --success: #22c55e;
            --warning: #eab308;
            --cpanel: #ff6c2c;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; overflow-x: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 260px; background: var(--sidebar); height: 100vh; position: fixed; 
            left: -260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; 
            border-right: 1px solid #334155; display: flex; flex-direction: column; 
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 25px; font-size: 22px; font-weight: bold; color: var(--accent); border-bottom: 1px solid #334155; text-align: center; }

        .profile-section { padding: 20px; border-bottom: 1px solid #334155; background: rgba(0,0,0,0.2); }
        .u-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .u-role { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 3px 10px; border-radius: 6px; display: inline-block; }
        
        .role-creator { background: linear-gradient(45deg, #ef4444, #991b1b); color: white; }
        .role-admin { background: var(--accent); color: #0f172a; }
        .role-reseller { background: var(--success); color: white; }

        .nav-item { 
            padding: 14px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; 
            transition: 0.2s; color: #94a3b8; font-size: 14px; 
        }
        .nav-item:hover { background: #334155; color: var(--accent); }
        .nav-item.active { background: #0f172a; border-left: 4px solid var(--accent); color: var(--accent); font-weight: bold; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 25px; width: 100%; transition: 0.3s; margin-left: 0; }
        @media (min-width: 1024px) {
            .sidebar { left: 0; }
            .main-content { margin-left: 260px; }
            .menu-btn { display: none; }
        }

        .header-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .menu-btn { background: var(--sidebar); border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; cursor: pointer; }
        
        .card { background: var(--sidebar); padding: 25px; border-radius: 12px; border: 1px solid #334155; max-width: 700px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px;}
        
        label { display: block; margin-bottom: 8px; font-size: 12px; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 20px; background: #0f172a; 
            border: 1px solid #475569; color: white; border-radius: 8px; outline: none; box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--accent); }
        
        .action-btn { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; 
        }
        .action-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        #output-box { 
            margin-top: 25px; padding: 20px; background: #020617; border-radius: 10px; 
            border-left: 4px solid var(--accent); font-family: monospace; font-size: 13px; color: #4ade80; white-space: pre-wrap;
        }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 900; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--accent); font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">ReyzCloud</div>
        
        <div class="profile-section">
            <div class="u-name"><i data-lucide="user"></i> <span id="sess-user">Memuat...</span></div>
            <div id="sess-role" class="u-role">...</div>
        </div>

        <div style="flex: 1; overflow-y: auto; padding-top: 10px;">
            <div class="nav-item active" id="nav-create" onclick="showTab(event, 'tab-create', 'Create Panel Game')">
                <i data-lucide="plus-circle"></i> Create Panel
            </div>
            <div class="nav-item" id="nav-cpanel" onclick="showTab(event, 'tab-cpanel', 'Create CPanel Hosting')">
                <i data-lucide="layout"></i> Create CPanel
            </div>
            <div class="nav-item" id="nav-subdo" onclick="showTab(event, 'tab-subdo', 'Cloudflare DNS')">
                <i data-lucide="globe"></i> Subdomain
            </div>
            <div class="nav-item" id="nav-list" onclick="showTab(event, 'tab-list', 'List Server')">
                <i data-lucide="database"></i> List Server
            </div>
            <div class="nav-item" id="nav-admin" onclick="showTab(event, 'tab-admin', 'User Management')">
                <i data-lucide="shield-check"></i> Admin Manage
            </div>
            <div class="nav-item" id="nav-danger" onclick="showTab(event, 'tab-danger', 'Danger Zone')">
                <i data-lucide="trash-2"></i> Delete System
            </div>
        </div>

        <div style="padding: 15px; border-top: 1px solid #334155;">
            <button onclick="logout()" class="action-btn" style="background: transparent; border: 1px solid var(--danger); color: var(--danger);">
                <i data-lucide="log-out" style="width:16px; vertical-align:middle"></i> Logout
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="header-bar">
            <button class="menu-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
            <h2 id="tab-title" style="margin:0">Create Panel Game</h2>
        </div>

        <div id="tab-create" class="tab-content">
            <div class="card">
                <label>Username Pembeli</label>
                <input type="text" id="userInput" placeholder="Masukkan username">
                <label>Pilih Paket RAM</label>
                <select id="pkgSelect"></select>
                <button id="btnCreate" class="action-btn" style="background: var(--accent); color: #0f172a;">🚀 Build Server Sekarang</button>
            </div>
        </div>

        <div id="tab-cpanel" class="tab-content" style="display:none">
            <div class="card" style="border-left: 4px solid var(--cpanel);">
                <label>Domain Website</label>
                <input type="text" id="cpDomain" placeholder="namadomain.com">
                <label>Pilih Paket Hosting</label>
                <select id="cpPkg">
                    <option value="starter">Starter - 1GB</option>
                    <option value="premium">Premium - Unlimited</option>
                </select>
                <button class="action-btn" style="background: var(--cpanel); color: white;">🌐 Aktifkan CPanel</button>
            </div>
        </div>

        <div id="tab-subdo" class="tab-content" style="display:none">
            <div class="card">
                <label>Pilih Domain Utama</label>
                <select id="domSelect"></select>
                <label>Hostname (Subdomain)</label>
                <input type="text" id="hostInput" placeholder="contoh: panel">
                <label>IP VPS</label>
                <input type="text" id="ipInput" placeholder="1.1.1.1">
                <button id="btnSubdo" class="action-btn" style="background: #f38020; color: white;">⚡ Create DNS Record</button>
            </div>
        </div>

        <div id="tab-admin" class="tab-content" style="display:none">
            <div class="card">
                <h3>👑 Admin Manage</h3>
                <label>Username Admin Baru</label>
                <input type="text" id="adminUsername" placeholder="Username">
                <button id="btnCreateAdmin" class="action-btn" style="background: var(--warning); color: #0f172a;">Daftarkan Admin ROOT</button>
            </div>
        </div>

        <div id="tab-list" class="tab-content" style="display:none">
            <div class="card">
                <button id="btnList" class="action-btn" style="background: var(--success); color: white; margin-bottom: 15px;">Refresh List Server</button>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nama Server</th>
                            <th>RAM</th>
                            <th>Disk</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-danger" class="tab-content" style="display:none">
            <div class="card" style="border: 2px solid var(--danger)">
                <h3 style="color:var(--danger)">Danger Zone (Hapus System)</h3>
                <p style="font-size: 13px; color: #94a3b8;">Menghapus server juga akan menghapus akun user yang terkait secara permanen.</p>
                <label>ID Server Target</label>
                <input type="text" id="idTarget" placeholder="Masukkan ID Server">
                <button id="btnDelServer" class="action-btn" style="background: var(--danger); color: white;">🔥 Hapus Server & Akun</button>
            </div>
        </div>

        <div id="output-box">Siap melayani...</div>
    </div>

    <script>
        // Inisialisasi Lucide
        lucide.createIcons();

        // Fungsi Toggle Sidebar Mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // Fungsi Logout
        function logout() {
            if(confirm("Apakah Anda yakin ingin keluar?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }
    </script>
    <script src="settings/config.js"></script>
    <script src="script.js"></script>
</body>
</html>
